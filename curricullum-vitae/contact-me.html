  <style>
    /* Contact page specific styles */
    .contact-wrapper {
      min-height: calc(100vh - 280px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    
    .contact-container {
      max-width: 800px;
      width: 100%;
      text-align: center;
    }
    
    .contact-intro {
      margin-bottom: 2.5rem;
    }
    
    .contact-intro h2 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1a2a33;
      border-left: none;
      padding-left: 0;
      letter-spacing: -0.02em;
    }
    
    .contact-intro p {
      font-size: 1.2rem;
      color: #3a5a6a;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .contact-grid {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    
    .contact-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 160px;
      height: 160px;
      background: white;
      border-radius: 24px;
      text-decoration: none;
      color: inherit;
      border: 2px solid rgba(71, 142, 186, 0.1);
      transition: all 0.3s ease;
      box-shadow: 0 2px 12px rgba(71, 142, 186, 0.05);
    }
    
    .contact-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(71, 142, 186, 0.12);
    }
    
    .contact-card .icon-wrapper {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.6rem;
      transition: transform 0.3s ease;
    }
    
    .contact-card:hover .icon-wrapper {
      transform: scale(1.05);
    }
    
    .contact-card .icon-wrapper svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    
    .contact-card .label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a2a33;
    }
    
    /* Individual card colors */
    .card-linkedin .icon-wrapper {
      background: #0a66c2;
    }
    .card-linkedin:hover {
      border-color: #0a66c2;
      background: white;
      box-shadow: 0 16px 40px rgba(10, 102, 194, 0.15);
    }
    
    .card-whatsapp .icon-wrapper {
      background: #25d366;
    }
    .card-whatsapp:hover {
      border-color: #25d366;
      background: white;
      box-shadow: 0 16px 40px rgba(37, 211, 102, 0.15);
    }
    
    .card-email .icon-wrapper {
      background: #ea4335;
    }
    .card-email:hover {
      border-color: #ea4335;
      background: white;
      box-shadow: 0 16px 40px rgba(234, 67, 53, 0.12);
    }
    
    @media (max-width: 768px) {
      .contact-wrapper {
        min-height: calc(100vh - 240px);
      }
      
      .contact-grid {
        gap: 1.5rem;
      }
      
      .contact-card {
        width: 140px;
        height: 140px;
        border-radius: 20px;
      }
      
      .contact-card .icon-wrapper {
        width: 56px;
        height: 56px;
      }
      
      .contact-card .icon-wrapper svg {
        width: 28px;
        height: 28px;
      }
      
      .contact-intro h2 {
        font-size: 2.4rem;
      }
      
      .contact-intro p {
        font-size: 1rem;
      }
    }
    
    @media (max-width: 480px) {
      .contact-wrapper {
        min-height: calc(100vh - 200px);
        justify-content: center;
      }
      
      .contact-grid {
        gap: 1rem;
      }
      
      .contact-card {
        width: 110px;
        height: 110px;
        border-radius: 16px;
      }
      
      .contact-card .icon-wrapper {
        width: 44px;
        height: 44px;
      }
      
      .contact-card .icon-wrapper svg {
        width: 22px;
        height: 22px;
      }
      
      .contact-card .label {
        font-size: 0.75rem;
      }
      
      .contact-intro h2 {
        font-size: 2rem;
      }
      
      .contact-intro p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
