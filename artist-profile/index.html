<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIP · maintenance</title>
  <!-- 
    ============================================================
    FONT PLACEHOLDER
    ============================================================
    Replace the href below with your custom font URL.
    If you use a self‑hosted font, update the @font-face in CSS.
    ============================================================
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* 
      ============================================================
      BACKGROUND IMAGE PLACEHOLDER
      ============================================================
      Replace the URL in the .bg-image rule below with your own.
      The image covers the entire viewport and stays fixed.
      ============================================================
    */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0d10; /* fallback if image fails */
      color: #f0f4fa;
      padding: 1.5rem;
      position: relative;
    }

    /* 
      ============================================================
      BACKGROUND IMAGE – place your image URL here
      ============================================================
    */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      /* 👇 REPLACE the URL with your own background image */
      background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2029&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      filter: brightness(0.5) saturate(0.8);
      transition: filter 0.2s;
    }

    /* subtle overlay to improve text readability */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 12, 20, 0.55);
      backdrop-filter: blur(2px);
      z-index: 1;
    }

    .main-card {
      position: relative;
      z-index: 2;
      max-width: 720px;
      width: 100%;
      background: rgba(18, 24, 34, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 0rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
      transition: transform 0.25s ease;
    }

    .main-card:hover {
      transform: scale(1.01);
    }

    .status-badge {
      display: inline-block;
      background: rgba(255, 190, 50, 0.18);
      backdrop-filter: blur(4px);
      padding: 0.45rem 1.4rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #ffd966;
      border: 1px solid rgba(255, 200, 80, 0.2);
      margin-bottom: 1.8rem;
    }

    .status-badge span {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #fbbf24;
      border-radius: 50%;
      margin-right: 10px;
      box-shadow: 0 0 8px #fbbf2480;
      animation: pulse-dot 1.6s infinite;
    }

    @keyframes pulse-dot {
      0% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.5; transform: scale(0.9); }
    }

    h1 {
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      background: linear-gradient(135deg, #ffffff 0%, #cfd9e6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .subhead {
      font-size: 1.3rem;
      font-weight: 400;
      color: #bcc8db;
      margin-bottom: 1.2rem;
      letter-spacing: -0.01em;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #c8d2e3;
      max-width: 500px;
      margin: 0 auto 2rem;
      background: rgba(0, 0, 0, 0.15);
      padding: 0.8rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .progress-track {
      background: rgba(255, 255, 255, 0.06);
      height: 6px;
      border-radius: 20px;
      margin: 1.8rem 0 2.2rem;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }

    .progress-fill {
      width: 62%;
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      border-radius: 20px;
      box-shadow: 0 0 12px #fbbf2470;
      animation: shimmer 2.6s infinite ease-in-out;
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .eta {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .eta-item {
      background: rgba(0, 0, 0, 0.25);
      padding: 0.45rem 1.2rem;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #d3def0;
      border: 1px solid rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(4px);
    }

    .eta-item strong {
      font-weight: 700;
      color: #f0f4fa;
      margin-right: 4px;
    }

    .footer-note {
      margin-top: 2.4rem;
      font-size: 0.85rem;
      color: #8f9bb3;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 1.8rem;
      letter-spacing: 0.2px;
    }

    .footer-note a {
      color: #b8c7e0;
      text-decoration: none;
      border-bottom: 1px dotted rgba(255, 255, 255, 0.15);
      transition: color 0.2s;
    }

    .footer-note a:hover {
      color: #ffffff;
      border-bottom-color: #fbbf24;
    }

    /* responsive */
    @media (max-width: 550px) {
      .main-card {
        padding: 2rem 1.5rem;
        border-radius: 2rem;
      }
      h1 {
        font-size: 2.6rem;
      }
      .subhead {
        font-size: 1.1rem;
      }
      .message {
        font-size: 0.95rem;
        padding: 0.6rem 1rem;
      }
      .eta-item {
        font-size: 0.8rem;
        padding: 0.3rem 1rem;
      }
    }

    /* 
      ============================================================
      FONT REPLACEMENT NOTE:
      The font is applied via the <link> at the top (Inter).
      To use a custom font, replace the href with your font URL
      OR add @font-face in this style block and update the 
      font-family in body or .main-card.
      ============================================================
    */
  </style>
</head>
<body>
  <!-- Background image container – REPLACE URL in .bg-image -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <main class="main-card">
    <!-- status pill -->
    <div class="status-badge">
      <span></span> maintenance in progress
    </div>

    <h1>Work in progress</h1>
    <p class="subhead">We're making things better</p>

    <div class="message">
      ⚡ Under construction · back soon
    </div>

    <!-- progress bar -->
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <!-- eta / status details -->
    <div class="eta">
      <span class="eta-item"><strong>ETA</strong> ~ 20 min</span>
      <span class="eta-item"><strong>stage</strong> polishing</span>
      <span class="eta-item"><strong>issue</strong> #42</span>
    </div>

    <div class="footer-note">
      <span>🛠️ </span>
      <span>We'll be back before you know it. </span>
      <span>— </span>
      <a href="#" onclick="event.preventDefault(); alert('Still WIP — but thanks for checking!');">check status</a>
      <span> · </span>
      <a href="#" onclick="event.preventDefault(); alert('No ETA changes yet, stay tuned.');">notify me</a>
    </div>

    <!-- 
      ============================================================
      FONT REPLACEMENT – additional info:
      The current font is 'Inter' from Google Fonts.
      To replace:
      1) Change the <link> href to your font (or add @font-face).
      2) Update the font-family in the body rule (or .main-card).
      Example: font-family: 'YourFont', sans-serif;
      ============================================================
    -->
  </main>
</body>
</html>
